# LoRA 微调 Qwen2.5-7B-Instruct 训练配置
# 使用 LLaMA-Factory 框架
# 适配 RTX 3090/4090 (24GB 显存)

### model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all
# 针对 Qwen2.5 的 attention + FFN 层，all 会自动选择所有线性层

### dataset
dataset: ruyi
template: qwen
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: ./output/ruyi-lora
logging_steps: 10
save_steps: 200
plot_loss: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
dataloader_num_workers: 2
max_grad_norm: 1.0

### eval (可选，数据量小可跳过)
# val_size: 0.05
# per_device_eval_batch_size: 2
# eval_steps: 200
